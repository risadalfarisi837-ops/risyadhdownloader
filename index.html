<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISYADH - MEDIA DOWNLOADER ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #e0e0e0;
            --main-black: #0a0a0a;
            --card-bg: #ffffff;
            --accent-primary: #6a0dad;
            --accent-secondary: #ccff00;
            --accent-tertiary: #ff5f00;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-head);
            background-color: var(--bg-color);
            color: var(--main-black);
            min-height: 100vh;
            padding-bottom: 50px;
            background-image: linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- UI ELEMENTS --- */
        .marquee-top {
            background: var(--main-black); color: white;
            padding: 10px 0; overflow: hidden; font-family: var(--font-mono); font-size: 0.8rem;
        }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        
        .cyber-card {
            background: var(--card-bg);
            border: 3px solid var(--main-black);
            box-shadow: 8px 8px 0px var(--main-black);
            padding: 25px; margin-bottom: 30px;
        }

        .cyber-input {
            width: 100%; padding: 15px; border: 3px solid var(--main-black);
            font-family: var(--font-mono); font-weight: bold; outline: none; margin-bottom: 20px;
        }

        .cyber-button {
            width: 100%; padding: 15px; background: var(--accent-secondary);
            border: 3px solid var(--main-black); font-weight: 900; cursor: pointer;
            box-shadow: 4px 4px 0px var(--main-black); transition: 0.2s;
        }
        .cyber-button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--main-black); }

        /* --- RESULT AREA --- */
        #result { margin-top: 20px; }
        .res-card { background: white; border: 3px solid var(--main-black); margin-bottom: 20px; overflow: hidden; }
        .res-img { width: 100%; border-bottom: 3px solid var(--main-black); display: block; object-fit: cover; max-height: 400px; }
        .res-info { padding: 15px; font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.5; }
        
        .dl-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .dl-btn {
            text-decoration: none; color: white; text-align: center; padding: 10px;
            font-weight: bold; border: 2px solid #000; font-size: 0.8rem;
        }
        .v-btn { background: var(--accent-primary); }
        .m-btn { background: var(--accent-tertiary); }

        #loading { display: none; text-align: center; font-weight: bold; margin: 20px; }

        /* --- FOOTER --- */
        footer { text-align: center; margin-top: 50px; }
        .highlight { background: var(--main-black); color: white; padding: 2px 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="marquee-top">
        <div class="marquee-content">
            SYSTEM READY • NO WATERMARK • RISYADH • FAST DOWNLOAD • SECURE • RISYADH • SYSTEM READY • NO WATERMARK • RISYADH • FAST DOWNLOAD • SECURE •
        </div>
    </div>

    <div class="container">
        <div class="cyber-card">
            <h1 style="font-weight: 900; margin-bottom: 10px;">RISYADH DL</h1>
            <p style="margin-bottom: 20px; font-size: 0.8rem;">PASTE LINK TIKTOK DI BAWAH:</p>
            
            <input type="text" id="urlInput" class="cyber-input" placeholder="https://vt.tiktok.com/xxxx/">
            <button onclick="prosesData()" id="btnAction" class="cyber-button">INITIATE DOWNLOAD</button>
        </div>

        <div id="loading">SEDANG MENCARI SERVER TERBAIK...</div>
        <div id="result"></div>

        <footer>
            <p>POWERED BY <span class="highlight">RISYADH</span></p>
        </footer>
    </div>

    <script>
        async function prosesData() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btnAction');
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loading');

            if (!url) return alert("Masukkan link dulu!");

            btn.disabled = true;
            loader.style.display = "block";
            resultDiv.innerHTML = "";

            let finalData = null;

            try {
                // Trik: Menggunakan Sistem Fallback (Coba API 1, kalau gagal coba API 2)
                
                // MCOBA API 1 (TikWM Direct)
                try {
                    console.log("Mencoba API 1 (TikWM)...");
                    const res1 = await fetch(`https://www.tikwm.com/api/?url=${url}`);
                    const json1 = await res1.json();
                    
                    if (json1.code === 0) {
                        const base = "https://www.tikwm.com";
                        finalData = {
                            cover: json1.data.cover.startsWith('http') ? json1.data.cover : base + json1.data.cover,
                            title: json1.data.title,
                            author: json1.data.author.unique_id,
                            videoUrl: json1.data.play.startsWith('http') ? json1.data.play : base + json1.data.play,
                            musicUrl: json1.data.music.startsWith('http') ? json1.data.music : base + json1.data.music
                        };
                    }
                } catch (e) {
                    console.warn("API 1 Gagal, beralih ke API 2...");
                }

                // MENCOBA API 2 (TiklyDown) jika API 1 gagal
                if (!finalData) {
                    try {
                        console.log("Mencoba API 2 (TiklyDown)...");
                        const res2 = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
                        const json2 = await res2.json();
                        
                        if (json2 && json2.video) {
                            finalData = {
                                cover: json2.video.cover,
                                title: json2.title,
                                author: json2.author.unique_id,
                                videoUrl: json2.video.noWatermark,
                                musicUrl: json2.music.play_url
                            };
                        }
                    } catch (e) {
                        console.warn("API 2 Gagal.");
                    }
                }

                // Jika kedua API gagal
                if (!finalData) {
                    throw new Error("Semua server API sedang sibuk atau link TikTok diprivat/tidak valid.");
                }

                // TAMPILKAN HASIL
                resultDiv.innerHTML = `
                    <div class="res-card">
                        <img src="${finalData.cover}" class="res-img" alt="Cover Video">
                        <div class="res-info">
                            <strong>TITLE:</strong> ${finalData.title || 'No Title'}<br>
                            <strong>AUTHOR:</strong> @${finalData.author || 'Unknown'}
                        </div>
                        <div class="dl-group">
                            <a href="${finalData.videoUrl}" target="_blank" class="dl-btn v-btn">VIDEO (NO WM)</a>
                            <a href="${finalData.musicUrl}" target="_blank" class="dl-btn m-btn">MUSIC (MP3)</a>
                        </div>
                    </div>
                `;

            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
