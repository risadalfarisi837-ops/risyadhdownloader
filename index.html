<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISYADH - MEDIA DOWNLOADER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Space+Grotesk:wght@300;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES & PALETTE --- */
        :root {
            --bg-color: #e0e0e0;
            --main-black: #0a0a0a;
            --card-bg: #ffffff;
            
            --accent-primary: #6a0dad;  
            --accent-secondary: #ccff00; 
            --accent-tertiary: #ff5f00;  
            
            --border-width: 3px;
            --font-head: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-head);
            background-color: var(--bg-color);
            color: var(--main-black);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- DECORATION & NOISE --- */
        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: -1;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPgo8cmVjdCB3aWR0aD0iNSIgaGVpZ2h0PSI1IiBmaWxsPSIjZmZmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9IiMwMDAiLz4KPC9zdmc+');
        }

        .floating-shape {
            position: fixed;
            z-index: -2;
            border: 2px solid var(--main-black);
            background: var(--accent-secondary);
            opacity: 0.6;
        }
        .shape-1 { width: 100px; height: 100px; top: 10%; left: -20px; border-radius: 50%; }
        .shape-2 { width: 150px; height: 150px; bottom: 20%; right: -40px; transform: rotate(45deg); background: var(--accent-primary); }

        /* --- MARQUEE --- */
        .marquee-top {
            background: var(--main-black);
            color: var(--card-bg);
            padding: 10px 0;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            font-weight: bold;
            border-bottom: var(--border-width) solid var(--accent-secondary);
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-content { display: inline-block; animation: scrollLeft 15s linear infinite; }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            border-bottom: var(--border-width) solid var(--main-black);
            position: sticky; top: 0; z-index: 100;
        }

        .brand-container { display: flex; align-items: center; }

        .brand-glitch {
            font-weight: 900; font-size: 1.5rem; letter-spacing: -1px;
            position: relative;
            color: var(--main-black);
            text-transform: uppercase;
        }
        .brand-glitch::before {
            content: attr(data-text); position: absolute; left: 2px; text-shadow: -1px 0 var(--accent-primary);
            top: 0; color: var(--main-black); background: var(--bg-color); overflow: hidden; clip: rect(0, 900px, 0, 0); animation: glitch 2s infinite linear alternate-reverse;
        }
        @keyframes glitch { 0% { clip: rect(20px, 9999px, 10px, 0); } 100% { clip: rect(50px, 9999px, 80px, 0); } }

        /* --- CONTAINER & CARD --- */
        .container { max-width: 550px; margin: 30px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 30px; }

        .cyber-card {
            background: var(--card-bg);
            border: var(--border-width) solid var(--main-black);
            box-shadow: 8px 8px 0 var(--main-black); 
            position: relative;
            overflow: hidden;
        }

        .screw { position: absolute; font-family: monospace; font-weight: bold; font-size: 1.2rem; pointer-events: none; }
        .top-left { top: 5px; left: 10px; } .top-right { top: 5px; right: 10px; }
        .bottom-left { bottom: 5px; left: 10px; } .bottom-right { bottom: 5px; right: 10px; }

        /* HEADER VISUAL BARU */
        .card-header-visual {
            background: var(--accent-primary);
            padding: 30px 20px 20px 20px;
            border-bottom: var(--border-width) solid var(--main-black);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-section { display: flex; align-items: center; gap: 15px; }

        /* AVATAR STYLING */
        .avatar-img {
            width: 60px; height: 60px;
            border: 3px solid var(--main-black);
            background: #fff;
            border-radius: 12px; 
            box-shadow: 4px 4px 0 var(--accent-secondary);
            object-fit: cover; 
            object-position: top center; 
        }

        .profile-info { display: flex; flex-direction: column; }
        .user-role { font-family: var(--font-mono); font-size: 0.7rem; color: var(--accent-secondary); font-weight: bold; letter-spacing: 1px; }
        .user-action { font-weight: 900; color: #fff; font-size: 1.1rem; text-transform: uppercase; line-height: 1.1; }

        .decor-lines { font-family: var(--font-mono); color: rgba(255,255,255,0.3); font-weight: 900; font-size: 1.5rem; letter-spacing: -2px; }

        /* --- INPUT SECTION --- */
        .card-body { padding: 25px; }
        .input-wrapper { position: relative; margin-bottom: 20px; }
        .input-label { font-family: var(--font-mono); font-weight: bold; font-size: 0.8rem; margin-bottom: 8px; display: block; }

        .cyber-input {
            width: 100%; padding: 18px;
            border: 3px solid var(--main-black);
            background: #f4f4f4;
            font-family: var(--font-mono); font-size: 1rem; font-weight: bold;
            outline: none; transition: 0.2s;
        }
        .cyber-input:focus { background: #fff; border-color: var(--accent-tertiary); }

        .platform-tags { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .platform-tags span {
            font-size: 0.75rem; font-weight: bold; background: #eee;
            padding: 4px 8px; border: 1px solid var(--main-black);
            font-family: var(--font-mono);
        }

        /* --- BUTTON UTAMA --- */
        .cyber-button {
            width: 100%; padding: 18px;
            border: 3px solid var(--main-black);
            background: var(--accent-secondary); 
            color: var(--main-black);
            font-family: var(--font-head); font-weight: 900; font-size: 1.2rem;
            text-transform: uppercase; cursor: pointer;
            position: relative; overflow: hidden;
            box-shadow: 5px 5px 0 var(--main-black);
            transition: all 0.1s;
            text-align: center;
        }
        .cyber-button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--main-black); }
        .cyber-button:hover { background: #bfff00; }

        /* --- RESULT CARD STYLING --- */
        .result-card {
            background: #fff; border: 3px solid var(--main-black);
            margin-bottom: 20px; padding: 0; box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }
        .result-header {
            background: var(--main-black); color: #fff;
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-mono); font-weight: bold; font-size: 0.85rem;
        }
        .result-badge { background: var(--accent-tertiary); color: #000; font-weight: bold; padding: 2px 6px; font-size: 0.7rem; border: 1px solid #fff; }
        .result-body { padding: 15px; }

        .res-img-container { background:#000; padding:5px; border:2px solid #000; margin-bottom: 15px; }
        .res-img-container img { width: 100%; max-height: 400px; object-fit: cover; display: block; border: none; }

        /* --- FOOTER RISYADH --- */
        .risyadh-footer {
            text-align: center; margin-top: 40px; padding-bottom: 20px;
            font-family: var(--font-mono);
        }
        .footer-line { width: 50px; height: 4px; background: var(--main-black); margin: 0 auto 15px auto; }
        .risyadh-highlight { background: var(--main-black); color: #fff; padding: 2px 6px; font-weight: bold; }

        .hidden { display: none !important; }

        /* LOADING ANIMATION */
        .scanner { width: 100%; height: 4px; background: var(--accent-primary); animation: scan 2s infinite ease-in-out; margin-bottom: 15px; }
        @keyframes scan { 0% { width: 0; } 50% { width: 100%; } 100% { width: 0; margin-left: auto; } }
        .blink-text { font-family: var(--font-mono); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* ERROR CARD */
        .error-state { border-color: red; box-shadow: 8px 8px 0 red; }
        .error-header { background: red; color: white; padding: 10px; font-weight: bold; font-family: var(--font-mono); }
        .error-body { padding: 20px; color: red; font-family: var(--font-mono); font-weight: bold; font-size: 0.9rem; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="bg-noise"></div>
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <div class="marquee-top">
        <div class="marquee-content">
            SYSTEM READY • V.4.3 ULTRA • PROXY-FREE ENGINE • TIKTOK • YOUTUBE • INSTAGRAM • RISYADH •
        </div>
    </div>

    <nav class="navbar">
        <div class="brand-container">
            <div class="brand-glitch" data-text="RISYADH">Risyadh</div>
        </div>
    </nav>

    <div class="container">
        
        <div class="cyber-card main-card">
            <div class="screw top-left">+</div>
            <div class="screw top-right">+</div>
            <div class="screw bottom-left">+</div>
            <div class="screw bottom-right">+</div>

            <div class="card-header-visual">
                <div class="profile-section">
                    <img src="profile.jpg" alt="User Profile" class="avatar-img" id="userAvatar" onerror="this.src='https://files.catbox.moe/1yu7kn.jpg'">
                    <div class="profile-info">
                        <span class="user-role">RISYADH DOWNLOADER</span>
                        <span class="user-action">PASTE YOUR LINK BELOW</span>
                    </div>
                </div>
                <div class="decor-lines">///</div>
            </div>
            
            <div class="card-body">
                <div class="input-wrapper">
                    <div class="input-label">TARGET URL:</div>
                    <input type="text" id="urlInput" class="cyber-input" placeholder="https://..." autocomplete="off">
                </div>

                <div class="platform-tags">
                    <span>#TIKTOK</span> <span>#YOUTUBE</span> <span>#INSTAGRAM</span>
                </div>
                
                <button id="downloadBtn" onclick="fetchMedia()" class="cyber-button">
                    <span class="btn-text">INITIATE DOWNLOAD</span>
                </button>
            </div>
        </div>

        <div id="loading" class="cyber-card hidden" style="text-align: center; padding: 40px;">
            <div class="scanner"></div>
            <p class="blink-text">PROCESSING DATA STREAM...</p>
        </div>

        <div id="error-msg" class="cyber-card error-state hidden">
            <div class="error-header">SYSTEM ERROR</div>
            <div class="error-body" id="error-text"></div>
        </div>

        <div id="result" class="result-stack"></div>

        <footer class="risyadh-footer">
            <div class="footer-line"></div>
            <p>POWERED BY <span class="risyadh-highlight">RISYADH</span></p>
            <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 5px;">ENGINEERED FOR MULTI-PLATFORM</p>
        </footer>

    </div>

    <script>
        // Fungsi fetch sederhana, anti-crash kalau server API ngirim HTML error
        async function fetchDirect(url) {
            try {
                const response = await fetch(url);
                const textData = await response.text(); 
                return JSON.parse(textData); // Ubah ke JSON dengan aman
            } catch (e) {
                return null; // Kalau gagal / ngirim HTML error, kembalikan null
            }
        }

        async function fetchMedia() {
            const input = document.getElementById('urlInput');
            const btn = document.getElementById('downloadBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const errorCard = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');
            const url = input.value.trim();

            if (!url) return alert("System Error: Target URL is empty!");

            // Reset UI
            btn.disabled = true;
            btn.innerHTML = "PROCESSING...";
            loading.classList.remove('hidden');
            resultDiv.innerHTML = '';
            errorCard.classList.add('hidden');

            let finalData = null;

            try {
                // ==========================================
                // LOGIC SEDERHANA: LANGSUNG TEMBAK API (TANPA PROXY)
                // ==========================================

                // 1. TIKTOK (Menggunakan TikWM)
                if (url.includes('tiktok.com')) {
                    const json = await fetchDirect(`https://www.tikwm.com/api/?url=${url}`);
                    
                    if (json && json.code === 0) {
                        const base = "https://www.tikwm.com";
                        finalData = {
                            platform: 'TIKTOK_DATA',
                            cover: json.data.cover.startsWith('http') ? json.data.cover : base + json.data.cover,
                            title: json.data.title,
                            author: json.data.author.unique_id,
                            videoUrl: json.data.play.startsWith('http') ? json.data.play : base + json.data.play,
                            musicUrl: json.data.music.startsWith('http') ? json.data.music : base + json.data.music
                        };
                    } else {
                        throw new Error("Video TikTok tidak valid, diprivat, atau dihapus.");
                    }
                } 
                
                // 2. YOUTUBE (Menggunakan Ryzendesu API)
                else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    const jsonVid = await fetchDirect(`https://api.ryzendesu.vip/api/downloader/ytmp4?url=${url}`);
                    const jsonAud = await fetchDirect(`https://api.ryzendesu.vip/api/downloader/ytmp3?url=${url}`);

                    if (!jsonVid || !jsonVid.url) throw new Error("Video YouTube tidak ditemukan atau diprivat.");

                    finalData = {
                        platform: 'YOUTUBE_DATA',
                        cover: jsonVid.thumbnail || 'profile.jpg',
                        title: jsonVid.title || 'YouTube Video',
                        author: 'YouTube',
                        videoUrl: jsonVid.url,
                        musicUrl: jsonAud ? jsonAud.url : null
                    };
                } 
                
                // 3. INSTAGRAM (Menggunakan Ryzendesu API)
                else if (url.includes('instagram.com')) {
                    const jsonIG = await fetchDirect(`https://api.ryzendesu.vip/api/downloader/igdl?url=${url}`);

                    if (!jsonIG || !jsonIG.data || jsonIG.data.length === 0) {
                        throw new Error("Gagal mengambil data Instagram (Pastikan akun tidak diprivat/terkunci).");
                    }

                    finalData = {
                        platform: 'IG_DATA',
                        cover: 'profile.jpg', 
                        title: 'Instagram Post / Reels',
                        author: 'Instagram User',
                        videoUrl: jsonIG.data[0].url, 
                        musicUrl: null 
                    };
                } 
                
                else {
                    throw new Error("Platform tidak didukung! Masukkan link TikTok, YouTube, atau Instagram.");
                }

                // Render ke HTML
                renderResult(finalData);

            } catch (err) {
                // Menangkap pesan error agar tidak muncul 'Unexpected token <'
                errorText.textContent = err.message;
                errorCard.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = "INITIATE DOWNLOAD";
                loading.classList.add('hidden');
            }
        }

        // FUNGSI RENDER HASIL HTML
        function renderResult(data) {
            const resultDiv = document.getElementById('result');
            const card = document.createElement('div');
            card.className = 'cyber-card result-card';
            
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.4s ease';

            setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, 100);

            let buttonsHTML = '';

            if (data.platform === 'TIKTOK_DATA') {
                buttonsHTML = `
                    <a href="${data.videoUrl}" target="_blank" style="text-decoration: none;">
                        <button class="cyber-button" style="background: var(--accent-primary); color: white; border-color: black; padding: 12px; font-size: 0.9rem;">
                            VIDEO (NO WM)
                        </button>
                    </a>
                    <a href="${data.musicUrl}" target="_blank" style="text-decoration: none;">
                        <button class="cyber-button" style="background: var(--accent-tertiary); color: white; border-color: black; padding: 12px; font-size: 0.9rem;">
                            MUSIC (MP3)
                        </button>
                    </a>
                `;
            } else if (data.platform === 'YOUTUBE_DATA') {
                buttonsHTML = `
                    <a href="${data.videoUrl}" target="_blank" style="text-decoration: none;">
                        <button class="cyber-button" style="background: var(--accent-primary); color: white; border-color: black; padding: 12px; font-size: 0.9rem;">
                            VIDEO (MP4)
                        </button>
                    </a>
                    ${data.musicUrl ? `
                    <a href="${data.musicUrl}" target="_blank" style="text-decoration: none;">
                        <button class="cyber-button" style="background: var(--accent-tertiary); color: white; border-color: black; padding: 12px; font-size: 0.9rem;">
                            AUDIO (MP3)
                        </button>
                    </a>` : ''}
                `;
            } else if (data.platform === 'IG_DATA') {
                buttonsHTML = `
                    <a href="${data.videoUrl}" target="_blank" style="text-decoration: none; grid-column: span 2;">
                        <button class="cyber-button" style="background: var(--accent-secondary); color: black; border-color: black; padding: 12px; font-size: 0.9rem;">
                            DOWNLOAD MEDIA (MP4/JPG)
                        </button>
                    </a>
                `;
            }

            card.innerHTML = `
                <div class="result-header">
                    <span>${data.platform} [HD]</span>
                    <span class="result-badge">SUCCESS</span>
                </div>
                <div class="result-body">
                    <div class="res-img-container">
                        <img src="${data.cover}" alt="Cover Image" onerror="this.src='https://files.catbox.moe/1yu7kn.jpg'">
                    </div>
                    
                    <div style="margin: 15px 0; font-family: 'JetBrains Mono'; font-size: 0.8rem; border-top: 2px dashed #ccc; padding-top: 15px; padding-bottom: 5px;">
                        <strong>> TITLE:</strong> ${data.title || 'No Title'}<br><br>
                        <strong>> AUTHOR:</strong> @${data.author || 'Unknown'}
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                        ${buttonsHTML}
                    </div>
                </div>
            `;

            resultDiv.appendChild(card);
        }
    </script>
</body>
</html>
